# ═══════════════════════════════════════════════════════
# CREOVA GROWTH AGENT — GitHub Actions Runner
# ═══════════════════════════════════════════════════════
#
# NO SERVER NEEDED. GitHub runs this for free on schedule.
# This IS the infrastructure. Claude pushes this file,
# GitHub does the rest — forever.
#
# Schedule: 6 runs/day across both platforms (IST times)
# Free tier: 2,000 minutes/month — more than enough.
# ═══════════════════════════════════════════════════════

name: Creova Growth Agent

on:
  schedule:
    # All times in UTC (IST = UTC+5:30)
    # Twitter morning slot:   8:30 AM IST = 3:00 UTC
    - cron: "0 3 * * *"
    # Instagram morning:      9:00 AM IST = 3:30 UTC
    - cron: "30 3 * * *"
    # Twitter lunch:          1:00 PM IST = 7:30 UTC
    - cron: "30 7 * * *"
    # Instagram afternoon:    3:30 PM IST = 10:00 UTC
    - cron: "0 10 * * *"
    # Twitter evening:        8:00 PM IST = 14:30 UTC
    - cron: "30 14 * * *"
    # Instagram night:        9:00 PM IST = 15:30 UTC
    - cron: "30 15 * * *"
    # Trend refresh (every 3h overlap):  6:00 UTC
    - cron: "0 6 * * *"
    # Trend refresh:                    12:00 UTC
    - cron: "0 12 * * *"
    # Engagement farming:     10:00 AM IST = 4:30 UTC
    - cron: "30 4 * * *"
    # Engagement farming:      5:00 PM IST = 11:30 UTC
    - cron: "30 11 * * *"
    # GitHub feature scan (every 6h):   0:00, 6:00, 12:00, 18:00 UTC
    - cron: "0 0,6,12,18 * * *"
    # Weekly learning: Monday 6:00 AM IST = 12:30 UTC Sunday
    - cron: "30 0 * * 1"
    # Competitor intel: Sunday 7:00 AM IST = 1:30 UTC Sunday
    - cron: "30 1 * * 0"

  workflow_dispatch:
    inputs:
      action:
        description: "What to run"
        required: true
        default: "post-twitter"
        type: choice
        options:
          - post-twitter
          - post-instagram
          - refresh-trends
          - detect-features
          - run-learning
          - run-engagement
          - competitor-intel

env:
  NODE_VERSION: "22"

jobs:
  route:
    name: Route to correct action
    runs-on: ubuntu-latest
    outputs:
      action: ${{ steps.decide.outputs.action }}
    steps:
      - name: Decide action from schedule
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=${{ github.event.inputs.action }}" >> $GITHUB_OUTPUT
            exit 0
          fi
          MINUTE=$(date -u +%M)
          HOUR=$(date -u +%H)
          DOW=$(date -u +%u)
          if [ "$HOUR" = "3" ] && [ "$MINUTE" = "0" ]; then
            echo "action=post-twitter" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "3" ] && [ "$MINUTE" = "30" ]; then
            echo "action=post-instagram" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "7" ] && [ "$MINUTE" = "30" ]; then
            echo "action=post-twitter" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "10" ] && [ "$MINUTE" = "0" ]; then
            echo "action=post-instagram" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "14" ] && [ "$MINUTE" = "30" ]; then
            echo "action=post-twitter" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "15" ] && [ "$MINUTE" = "30" ]; then
            echo "action=post-instagram" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "4" ] && [ "$MINUTE" = "30" ]; then
            echo "action=run-engagement" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "11" ] && [ "$MINUTE" = "30" ]; then
            echo "action=run-engagement" >> $GITHUB_OUTPUT
          elif [ "$MINUTE" = "0" ] && ([ "$HOUR" = "0" ] || [ "$HOUR" = "6" ] || [ "$HOUR" = "12" ] || [ "$HOUR" = "18" ]); then
            echo "action=detect-features" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "0" ] && [ "$MINUTE" = "30" ] && [ "$DOW" = "1" ]; then
            echo "action=run-learning" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "1" ] && [ "$MINUTE" = "30" ] && [ "$DOW" = "7" ]; then
            echo "action=competitor-intel" >> $GITHUB_OUTPUT
          else
            echo "action=refresh-trends" >> $GITHUB_OUTPUT
          fi
  run-agent:
    name: Run agent — ${{ needs.route.outputs.action }}
    needs: route
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: creova-agent

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Set environment variables
        run: |
          echo "NODE_ENV=production" >> $GITHUB_ENV
          echo "ACTION=${{ needs.route.outputs.action }}" >> $GITHUB_ENV

      - name: Post to Twitter/X
        if: needs.route.outputs.action == 'post-twitter'
        run: node src/index.js post-now twitter
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.AGENT_GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          AGENT_BRAND_NAME: "Creova Studio"
          AGENT_WEBSITE_URL: "https://creovas.studio"
          AGENT_TARGET_AUDIENCE: "AI founders, indie hackers, creators, startups"
          AGENT_MIN_QUALITY_SCORE: "75"
          AGENT_TIMEZONE: "Asia/Kolkata"

      - name: Post to Instagram
        if: needs.route.outputs.action == 'post-instagram'
        run: node src/index.js post-now instagram
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          AGENT_BRAND_NAME: "Creova Studio"
          AGENT_WEBSITE_URL: "https://creovas.studio"
          AGENT_TARGET_AUDIENCE: "AI founders, indie hackers, creators, startups"
          AGENT_MIN_QUALITY_SCORE: "75"
          AGENT_TIMEZONE: "Asia/Kolkata"

      - name: Refresh Trends
        if: needs.route.outputs.action == 'refresh-trends'
        run: node src/index.js refresh-trends
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          AGENT_BRAND_NAME: "Creova Studio"
          AGENT_WEBSITE_URL: "https://creovas.studio"
          AGENT_TARGET_AUDIENCE: "AI founders, indie hackers, creators, startups"

      - name: Detect GitHub Features
        if: needs.route.outputs.action == 'detect-features'
        run: node src/index.js detect-features
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          AGENT_GITHUB_TOKEN: ${{ secrets.AGENT_GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AGENT_BRAND_NAME: "Creova Studio"
          AGENT_WEBSITE_URL: "https://creovas.studio"

      - name: Run Weekly Learning
        if: needs.route.outputs.action == 'run-learning'
        run: node src/index.js run-learning
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AGENT_BRAND_NAME: "Creova Studio"
          AGENT_WEBSITE_URL: "https://creovas.studio"

      - name: Run Engagement Farming
        if: needs.route.outputs.action == 'run-engagement'
        run: node src/index.js run-engagement
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          AGENT_BRAND_NAME: "Creova Studio"
          AGENT_WEBSITE_URL: "https://creovas.studio"
          AGENT_TARGET_AUDIENCE: "AI founders, indie hackers, creators, startups"

      - name: Competitor Intelligence
        if: needs.route.outputs.action == 'competitor-intel'
        run: node src/index.js competitor-intel
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AGENT_BRAND_NAME: "Creova Studio"
          AGENT_WEBSITE_URL: "https://creovas.studio"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7

  notify-failure:
    name: Alert on failure
    needs: run-agent
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Send Telegram alert
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=❌ Creova Agent FAILED%0A%0AAction: ${{ needs.route.outputs.action }}%0ARun: ${{ github.run_id }}%0ACheck: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
